<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Parallel Lives</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

</head>

<body>
<div class="ambient-light"></div>
    <main>

        <!-- SCENE 01 -->

        <section class="scene scene-01">

            <div class="film-grain"></div>

            <div class="copy">

                <h1>
                    There are lives
                    <span>I'll never live.</span>
                </h1>

            </div>

        </section>

        <!-- SCENE 02 -->

        <section class="scene scene-02">

            <div class="copy">

                <h2>
                    Sometimes,
                    <span>I visit them anyway.</span>
                </h2>

            </div>

        </section>

    </main>

    <script src="script.js"></script>
