<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Parallel Lives</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="ambient-light"></div>
    <main>

        <!-- SCENE 01 -->

        <section class="scene scene-01">

            <div class="film-grain"></div>

            <div class="copy">

                <h1>
                    There are lives
                    <span>I'll never live.</span>
                </h1>

            </div>

        </section>

        <!-- SCENE 02 -->

        <section class="scene scene-02">

            <div class="copy">

                <h2>
                    Sometimes,
                    <span>I visit them anyway.</span>
                </h2>

            </div>

        </section>

<!-- SCENE 03 -->

<section class="scene scene-03">

<div class="scene-03-image"></div>

    <div class="copy copy-03">

        <h2>
            One version of me
            <span>learnt cities</span>
            <span>by their platforms.</span>
        </h2>

        <p class="scene-03-reveal">
            Not their skylines.
        </p>

    </div>

</section>



    </main>

   



<section class="scene scene--04" id="scene-04">

    <div class="scene04-bg"></div>

    <div class="scene04-film"></div>

    <div class="scene04-vignette"></div>

    <div class="scene04-rain"></div>

    <div class="scene04-copy">

    <div class="scene04-text text-1">

        <p>Some nights,</p>

        <div class="space"></div>

        <p>I remembered myself</p>
        <p>through other people's songs.</p>

    </div>

</div>

</section>

 <script src="script.js"></script>
</body>
</html>
